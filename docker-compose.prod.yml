services:
  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: []
    volumes:
      - minio_data:/data

  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=browserclaw_public"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=idan@browserclaw.org"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  frontend:
    build:
      args:
        NEXT_PUBLIC_GA_ID: "G-PG1VRFZPH3"
    environment:
      BROWSER_INTERNAL_TOKEN: "${BROWSER_INTERNAL_TOKEN}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend-secure.rule=Host(`browserclaw.org`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend-secure.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  browser:
    environment:
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "browserclaw-skills"
    ports: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.browser.rule=PathPrefix(`/vnc`)"
      - "traefik.http.routers.browser.entrypoints=web"
      - "traefik.http.routers.browser.priority=10"
      - "traefik.http.routers.browser.middlewares=strip-vnc"
      - "traefik.http.routers.browser-secure.rule=Host(`browserclaw.org`) && PathPrefix(`/vnc`)"
      - "traefik.http.routers.browser-secure.entrypoints=websecure"
      - "traefik.http.routers.browser-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.browser-secure.priority=10"
      - "traefik.http.routers.browser-secure.middlewares=strip-vnc"
      - "traefik.http.middlewares.strip-vnc.stripprefix.prefixes=/vnc"
      - "traefik.http.services.browser.loadbalancer.server.port=6080"

volumes:
  minio_data:
  letsencrypt:
